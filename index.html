<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH AGENT BALANCE GAME</title>
    <!-- 이미지 저장을 위한 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Pretendard Variable Font ONLY -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    
    <style>
        :root {
            --bg-color: #030304; /* 더 깊고 무거운 심연의 블랙 */
            --text-color: #ffffff;
            --line-color: rgba(255, 255, 255, 0.15);
            --disabled-color: #4a4a4d;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* 영문/한글 모두 프리텐다드 얇은 웨이트(300), 자간 -50(-0.05em) 적용 */
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            font-weight: 300;
            letter-spacing: -0.05em; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 자평 97% 적용 클래스 */
        .scale-text {
            display: inline-block;
            transform: scaleX(0.97);
            transform-origin: center;
        }

        h1, h2 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.1em; /* 영문 대문자 타이틀의 세련된 자간 */
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        /* Screen States */
        .screen { display: none; }
        .screen.active { display: block; animation: cyberFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes cyberFadeIn {
            from { opacity: 0; transform: translateY(15px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Login Screen (박스 제거, 블랙 배경화) */
        #login-screen { 
            text-align: center; 
            padding: 40px;
            background: transparent; /* 배경 투명화 */
            border: none; /* 테두리 제거 */
            box-shadow: none; /* 그림자 제거 */
        }

        /* 마름모 애니메이션 UI */
        .rhombus-spinner {
            position: relative;
            width: 24px;
            height: 24px;
            margin: 0 auto 35px auto;
            transform: rotate(45deg);
            animation: spin-outer 6s linear infinite;
        }
        .rhombus-spinner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .rhombus-spinner::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: spin-inner 4s linear infinite reverse;
        }

        @keyframes spin-outer { 100% { transform: rotate(405deg); } }
        @keyframes spin-inner { 100% { transform: rotate(360deg); } }
        
        .input-group { margin: 40px 0; }
        
        input[type="password"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: var(--text-color);
            font-size: 1.5rem;
            padding: 10px;
            text-align: center;
            outline: none;
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            font-weight: 200;
            letter-spacing: 0.3em;
            width: 220px;
            transition: border-color 0.4s, box-shadow 0.4s;
        }
        input[type="password"]:focus {
            border-bottom-color: #fff;
            box-shadow: 0 15px 15px -15px rgba(255, 255, 255, 0.4);
        }
        
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: var(--text-color);
            padding: 14px 45px;
            font-size: 0.85rem;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
        }
        button:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Game Screen */
        .progress-bar {
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 50px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
        }

        .choice-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 세련된 버튼 & V1 애니메이션 부활 */
        .choice-btn {
            width: 100%;
            padding: 40px 30px;
            font-size: 1.2rem;
            font-weight: 300;
            text-align: center;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: rgba(255, 255, 255, 0.7);
            position: relative;
            word-break: keep-all;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        
        /* 텍스트 컨테이너 (자평 97% 유지 및 z-index 확보) */
        .choice-btn .btn-text {
            position: relative;
            z-index: 2;
            display: inline-block;
            transform: scaleX(0.97);
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 2px; height: 100%;
            background-color: #ffffff;
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }
        
        .choice-btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, transparent 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }

        .choice-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
            box-shadow: 0 5px 25px rgba(255, 255, 255, 0.05);
        }
        .choice-btn:hover::before { transform: scaleY(1); }
        .choice-btn:hover::after { transform: scaleX(1); }
        
        .vs-text {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 200;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.2em;
            margin: 10px 0;
        }

        /* Result Screen */
        #capture-area {
            background-color: #030304; 
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        
        #capture-area::before, #capture-area::after {
            content: ''; position: absolute; width: 10px; height: 10px; border: 1px solid #ffffff;
        }
        #capture-area::before { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        #capture-area::after { bottom: 15px; right: 15px; border-left: none; border-top: none; }

        .result-header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 30px;
        }
        .result-header h1 { margin: 0; font-size: 1.8rem; color: #ffffff; font-weight: 300; letter-spacing: 0.05em; }
        .result-header p { 
            margin: 15px 0 0 0; 
            font-size: 0.9rem; 
            color: rgba(255,255,255,0.4); 
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem;
        }
        
        .res-text { 
            flex: 1; 
            text-align: center; 
            word-break: keep-all; 
            padding: 10px 15px; 
            line-height: 1.4;
        }
        
        .res-vs { 
            margin: 0 20px; 
            color: rgba(255, 255, 255, 0.15); 
            font-size: 0.7rem; 
            font-weight: 200;
        }
        
        .selected-option {
            font-weight: 400; 
            color: #ffffff;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border-left: 2px solid #ffffff;
        }
        
        .unselected-option {
            color: var(--disabled-color);
            text-decoration: line-through;
            text-decoration-color: rgba(255,255,255,0.2);
            opacity: 0.3;
        }

        .btn-wrap { text-align: center; margin-top: 50px; display: flex; justify-content: center; gap: 20px; }
        .btn-wrap button { font-size: 0.8rem; background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <!-- 회전하는 마름모 애니메이션 -->
        <div class="rhombus-spinner"></div>
        
        <h1 style="margin: 0; font-size: 1.8rem; letter-spacing: 0.1em;">ARCH 2026</h1>
        <p class="scale-text" style="font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 15px; margin-bottom: 30px;">요원 인증이 필요합니다.</p>
        <div class="input-group">
            <input type="password" id="password-input" placeholder="••••••••" />
        </div>
        <button onclick="checkPassword()">ACCESS SYSTEM</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="progress-bar">
            <span>ARCH AGENT BALANCE GAME</span>
            <span id="q-counter">01 / 10</span>
        </div>
        <div class="choice-container">
            <div class="choice-btn" id="btn-left-container" onclick="selectOption('left')">
                <span class="btn-text" id="btn-left">왼쪽 선택지</span>
            </div>
            <div class="vs-text">VS</div>
            <div class="choice-btn" id="btn-right-container" onclick="selectOption('right')">
                <span class="btn-text" id="btn-right">오른쪽 선택지</span>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <div id="capture-area">
            <div class="result-header">
                <h1>ARCH AGENT BALANCE GAME</h1>
                <p class="scale-text">아크에이전트 2026 시즌 밸런스게임 결과지</p>
            </div>
            <div id="result-list"></div>
        </div>
        <div class="btn-wrap">
            <button onclick="saveImage()">SAVE DATA</button>
            <button onclick="location.reload()">REBOOT SYSTEM</button>
        </div>
    </div>
</div>

<script>
    // 누락되었던 콤마(,)를 완벽하게 복구했습니다. 이제 에러가 나지 않습니다.
    const allQuestions = [
        { left: "오아시스랑 야외플하다가 해일, 윈터 만나기", right: "윈터랑 야외플하다가 해일, 오아시스 만나기" },
        { left: "신드롬에게서 외모 평가 받기", right: "오버로드에게서 몸매관리받기" },
        { left: "잠자는 카토 깨우기", right: "자고있는데 카토에게 깨워지기" },
        { left: "산타랑 평생 핫초코 먹기", right: "블루랑 평생 컵라면 먹기" },
        { left: "피카한테 전기 맞아서 사과받기", right: "오아시스 가이드 거절해서 상처받은 표정보기" },
        { left: "퓨어한테 착정 당하기", right: "오아시스한테 착정당하기" },
        { left: "카르마에게 1시간 동안 저주파전기치료받기", right: "밴스와 1시간 동안 면담하기" },
        { left: "에덴 밥 먹기", right: "페더 밥 먹기" },
        { left: "바이브랑 1주일동안 순대국밥만 먹기", right: "리암이랑 1주일동안 펠메니만 먹기" },
        { left: "햄스터로 변한 헬리오스", right: "친칠라가 된 저스티스" },
        { left: "카르마 방에서 자위하다 카르마한테 들키기", right: "오버로드가 PT 트레이너" },
        { left: "저스티스한테 선글라스 뺏기", right: "밴스한테 안경 뺏기" },
        { left: "내가 제일 잘나가 추는 저스티스", right: "캐치캐치 추는 헬리오스" },
        { left: "신드롬이랑 주딱하다가 실수로 전 애인 이름 부르기", right: "산타랑 주딱하다가 실수로 전애인 이름 부르기" },
        { left: "신드롬한테 하루종일 씨발 듣기", right: "에덴한테 하루종일 결합품 소리 듣기" },
        { left: "밴스와 키스할 때마다 안경 김 서리기(안경 못 벗음)", right: "해일과 스킨십할 때마다 머리카락 입에 들어가기" },
        { left: "리암에게 얼려지기", right: "라임에게 얼려지기" },
        { left: "샤드에게 스킨십 전에 '어디부터 시작해도 되겠습니까?' 하고 허락받기", right: "밴스에게 끝나고 '고생하셨습니다' 인사하기" },
        { left: "이카로스의 날개에 맞기", right: "솔라리스에게 밟히기" },
        { left: "헬리오스 농담 10시간 듣기", right: "해일 길안내 10시간 하기" },
        { left: "휴고에게 경멸", right: "애쉬에게서 경멸" },
        { left: "노아의 다정", right: "페더의 다정" }
    ];

    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let userChoices = [];

    function checkPassword() {
        const pw = document.getElementById('password-input').value;
        if(pw === "ARCH251024") { 
            startGame();
        } else {
            alert("ACCESS DENIED : 인가되지 않은 요원입니다.");
        }
    }

    // 엔터키 로그인 지원
    document.getElementById('password-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPassword();
    });

    function startGame() {
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        selectedQuestions = shuffled.slice(0, 10);
        
        updateGameUI();
    }

    function updateGameUI() {
        if(currentQuestionIndex >= 10) {
            showResult();
            return;
        }
        
        const q = selectedQuestions[currentQuestionIndex];
        document.getElementById('q-counter').innerText = `0${currentQuestionIndex + 1} / 10`.slice(-7);
        document.getElementById('btn-left').innerText = q.left;
        document.getElementById('btn-right').innerText = q.right;
    }

    function selectOption(side) {
        userChoices.push({
            question: selectedQuestions[currentQuestionIndex],
            selectedSide: side
        });
        currentQuestionIndex++;
        updateGameUI();
    }

    function showResult() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = '';

        userChoices.forEach((choice) => {
            const isLeftSelected = choice.selectedSide === 'left';
            const div = document.createElement('div');
            div.className = 'result-item';
            
            div.innerHTML = `
                <div class="res-text scale-text ${isLeftSelected ? 'selected-option' : 'unselected-option'}">
                    ${choice.question.left}
                </div>
                <div class="res-vs scale-text">VS</div>
                <div class="res-text scale-text ${!isLeftSelected ? 'selected-option' : 'unselected-option'}">
                    ${choice.question.right}
                </div>
            `;
            resultList.appendChild(div);
        });
    }

    function saveImage() {
        const captureArea = document.getElementById('capture-area');
        const btnWrap = document.querySelector('.btn-wrap');
        btnWrap.style.display = 'none'; 

        setTimeout(() => {
            html2canvas(captureArea, {
                backgroundColor: '#030304',
                scale: 2,
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'ARCH_AGENT_Result.png';
                link.href = canvas.toDataURL();
                link.click();
                btnWrap.style.display = 'flex'; 
            });
        }, 100);
    }
</script>

</body>
</html>
