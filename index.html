<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH AGENT BALANCE GAME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Stylish SF Black & White Glassmorphism UI Style */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0a0a0c; /* 깊은 암전 블랙 */
            --text-color: #ffffff; /* 순백 화이트 */
            --accent-color: #ffffff;
            --line-color: rgba(255, 255, 255, 0.25); /* 유리 테두리용 라인 */
            --disabled-color: #555558; /* 선택되지 않은 항목 회색 처리 */
            --glass-bg: rgba(255, 255, 255, 0.03); /* 홀로그램 유리 배경 */
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* 그리드 레이어 완벽 삭제 */
        }

        h1, h2 {
            font-family: 'Share Tech Mono', 'Noto Sans KR', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Screen States */
        .screen { display: none; }
        .screen.active { display: block; animation: cyberFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes cyberFadeIn {
            from { opacity: 0; transform: scale(0.98); filter: blur(4px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* Login Screen */
        #login-screen { 
            text-align: center; 
            padding: 50px 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .input-group { margin: 30px 0; }
        input[type="password"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--text-color);
            color: var(--text-color);
            font-size: 1.3rem;
            padding: 10px;
            text-align: center;
            outline: none;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 5px;
            width: 200px;
            transition: all 0.3s;
        }
        input[type="password"]:focus {
            border-bottom-color: var(--text-color);
            box-shadow: 0 10px 10px -10px rgba(255, 255, 255, 0.3);
        }
        
        button {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px 35px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Share Tech Mono', 'Noto Sans KR', monospace;
            letter-spacing: 1px;
        }
        button:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* Game Screen */
        .progress-bar {
            border-bottom: 1px solid var(--line-color);
            margin-bottom: 40px;
            padding-bottom: 15px;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
        }

        .choice-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .choice-btn {
            width: 100%;
            padding: 35px 25px;
            font-size: 1.15rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: rgba(255, 255, 255, 0.85);
            position: relative;
            word-break: keep-all;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .vs-text {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--disabled-color);
            letter-spacing: 2px;
        }

        /* Result Screen (Stylish Glassmorphism) */
        #capture-area {
            background-color: #050505; /* 이미지 저장용 딥 블랙 고정 */
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        
        /* SF 테크놀로지 코너 데코레이션 라인 */
        #capture-area::before, #capture-area::after {
            content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid #ffffff;
        }
        #capture-area::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
        #capture-area::after { bottom: 8px; right: 8px; border-left: none; border-top: none; }

        .result-header {
            text-align: center;
            margin-bottom: 45px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 25px;
        }
        .result-header h1 { margin: 0; font-size: 2.1rem; font-weight: 400; color: #ffffff; }
        .result-header p { margin: 8px 0 0 0; font-size: 1rem; font-weight: 300; color: rgba(255,255,255,0.6); letter-spacing: 1px; }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }
        
        .res-text { flex: 1; text-align: center; word-break: keep-all; padding: 8px 12px; transition: all 0.3s; }
        .res-vs { margin: 0 15px; font-family: 'Share Tech Mono', monospace; color: rgba(255, 255, 255, 0.2); font-size: 0.75rem; }
        
        /* 선택된 항목: 화려한 화이트 네온 라인 및 발광 효과 */
        .selected-option {
            font-weight: 700;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            border-left: 3px solid #ffffff;
            box-shadow: inset 5px 0 15px rgba(255, 255, 255, 0.1);
        }
        
        /* 선택되지 않은 항목: 세련된 다크 그레이 및 취소선 */
        .unselected-option {
            color: var(--disabled-color);
            text-decoration: line-through;
            opacity: 0.4;
        }

        .btn-wrap { text-align: center; margin-top: 40px; display: flex; justify-content: center; gap: 15px; }
        .btn-wrap button { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.3); }
        .btn-wrap button:hover { background: #ffffff; border-color: #ffffff; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <h1>SYSTEM LOGIN</h1>
        <p style="font-size: 0.9rem; color: rgba(255,255,255,0.5); letter-spacing: 1px;">요원 인증이 필요합니다.</p>
        <div class="input-group">
            <input type="password" id="password-input" placeholder="••••••••" />
        </div>
        <button onclick="checkPassword()">ACCESS SYSTEM ></button>
    </div>

    <div id="game-screen" class="screen">
        <div class="progress-bar">
            <span>ARCH AGENT BALANCE GAME</span>
            <span id="q-counter">01 / 10</span>
        </div>
        <div class="choice-container">
            <button class="choice-btn" id="btn-left" onclick="selectOption('left')">왼쪽 선택지</button>
            <div class="vs-text">VS</div>
            <button class="choice-btn" id="btn-right" onclick="selectOption('right')">오른쪽 선택지</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div id="capture-area">
            <div class="result-header">
                <h1>ARCH AGENT BALANCE GAME</h1>
                <p>아크에이전트 2026 시즌 밸런스게임 결과지</p>
            </div>
            <div id="result-list"></div>
        </div>
        <div class="btn-wrap">
            <button onclick="saveImage()">[ SAVE DATA ]</button>
            <button onclick="location.reload()">[ REBOOT SYSTEM ]</button>
        </div>
    </div>
</div>

<script>
    // --- 데이터 베이스 ---
    const allQuestions = [
        { left: "오아시스랑 야외플하다가 해일, 윈터 만나기", right: "윈터랑 야외플하다가 해일, 오아시스 만나기" },
        { left: "신드롬에게서 외모 평가 받기", right: "오버로드에게서 몸매관리받기" },
        { left: "잠자는 카토 깨우기", right: "자고있는데 카토에게 깨워지기" },
        { left: "산타랑 평생 핫초코 먹기", right: "블루랑 평생 컵라면 먹기" },
        { left: "피카한테 전기 맞아서 사과받기", right: "오아시스 가이드 거절해서 상처받은 표정보기" },
        { left: "퓨어한테 착정 당하기", right: "오아시스한테 착정당하기" },
        { left: "카르마에게 1시간 동안 저주파전기치료받기", right: "밴스와 1시간 동안 면담하기" },
        { left: "에덴 밥 먹기", right: "해일이 길안내하기" },
        { left: "바이브랑 1주일동안 순대국밥만 먹기", right: "리암이랑 1주일동안 펠메니만 먹기" },
        { left: "햄스터로 변한 헬리오스", right: "친칠라가 된 저스티스" },
        { left: "카르마 방에서 자위하다 카르마한테 들키기", right: "오버로드가 PT 트레이너" },
        { left: "저스티스한테 선글라스 뺏기", right: "밴스한테 안경 뺏기" },
        { left: "내가 제일 잘나가 추는 저스티스", right: "캐치캐치 추는 헬리오스" },
        { left: "신드롬이랑 주딱하다가 실수로 전 애인 이름 부르기", right: "산타랑 주딱하다가 실수로 전애인 이름 부르기" },
        { left: "신드롬한테 하루종일 씨발 듣기", right: "에덴한테 하루종일 결합품 소리 듣기" },
        { left: "밴스와 키스할 때마다 안경 김 서리기(안경 못 벗음)", right: "해일과 스킨십할 때마다 머리카락 입에 들어가기" },
        { left: "리암에게 얼려지기", right: "라임에게 얼려지기" },
        { left: "샤드에게 스킨십 전에 '어디부터 시작해도 되겠습니까?' 하고 허락받기", right: "밴스에게 끝나고 '고생하셨습니다' 인사하기" }
    ];

    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let userChoices = [];

    function checkPassword() {
        const pw = document.getElementById('password-input').value;
        if(pw === "ARCH2026") { 
            startGame();
        } else {
            alert("ACCESS DENIED: 비밀번호가 일치하지 않습니다.");
        }
    }

    function startGame() {
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        selectedQuestions = shuffled.slice(0, 10);
        
        updateGameUI();
    }

    function updateGameUI() {
        if(currentQuestionIndex >= 10) {
            showResult();
            return;
        }
        
        const q = selectedQuestions[currentQuestionIndex];
        document.getElementById('q-counter').innerText = `0${currentQuestionIndex + 1} / 10`.slice(-7);
        document.getElementById('btn-left').innerText = q.left;
        document.getElementById('btn-right').innerText = q.right;
    }

    function selectOption(side) {
        userChoices.push({
            question: selectedQuestions[currentQuestionIndex],
            selectedSide: side
        });
        currentQuestionIndex++;
        updateGameUI();
    }

    function showResult() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = '';

        userChoices.forEach((choice) => {
            const isLeftSelected = choice.selectedSide === 'left';
            const div = document.createElement('div');
            div.className = 'result-item';
            
            div.innerHTML = `
                <div class="res-text ${isLeftSelected ? 'selected-option' : 'unselected-option'}">
                    ${choice.question.left}
                </div>
                <div class="res-vs">VS</div>
                <div class="res-text ${!isLeftSelected ? 'selected-option' : 'unselected-option'}">
                    ${choice.question.right}
                </div>
            `;
            resultList.appendChild(div);
        });
    }

    function saveImage() {
        const captureArea = document.getElementById('capture-area');
        const btnWrap = document.querySelector('.btn-wrap');
        btnWrap.style.display = 'none';

        html2canvas(captureArea, {
            backgroundColor: '#050505', /* 캡처 퀄리티 보정 */
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'ARCH_AGENT_Result.png';
            link.href = canvas.toDataURL();
            link.click();
            btnWrap.style.display = 'flex';
        });
    }
</script>

</body>
</html>
